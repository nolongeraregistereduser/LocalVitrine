<div class="auth-page">
  <div class="auth-card">
    <h1>Inscription</h1>
    <p class="auth-subtitle">Créez votre compte LocalVitrine.</p>
    <p *ngIf="serverError" class="auth-banner" role="alert">{{ serverError }}</p>
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        <span>Nom complet</span>
        <input type="text" formControlName="fullName" placeholder="Votre nom" autocomplete="name" />
        <small *ngIf="form.controls.fullName.touched && form.controls.fullName.invalid">
          Nom requis
        </small>
      </label>
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="vous@example.com" autocomplete="email" />
        <small *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Adresse email invalide
        </small>
      </label>
      <label>
        <span>Mot de passe</span>
        <input type="password" formControlName="password" placeholder="Au moins 8 caractères" autocomplete="new-password" />
        <small *ngIf="form.controls.password.touched && form.controls.password.invalid">
          Minimum 8 caractères
        </small>
      </label>
      <button type="submit" [disabled]="submitting">{{ submitting ? 'Création…' : 'Créer mon compte' }}</button>
    </form>
    <p class="auth-footer">
      Déjà inscrit ?
      <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
