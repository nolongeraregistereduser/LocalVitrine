<ng-container *ngIf="isAuthRoute$ | async; else appShell">
  <main class="auth-layout lv-container">
    <router-outlet></router-outlet>
  </main>
</ng-container>

<ng-template #appShell>
  <div class="shell lv-container">
    <header class="shell__topbar">
      <a class="brand" routerLink="/dashboard">LocalVitrine</a>
      <div class="topbar__actions">
        <button class="ghost-button" type="button" (click)="logout()">Se déconnecter</button>
      </div>
    </header>

    <div class="shell__body">
      <aside class="sidebar" aria-label="Navigation principale">
        <nav class="sidebar__nav">
          <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            Tableau de bord
          </a>
          <a routerLink="/dashboard" routerLinkActive="active">Projets</a>
        </nav>
      </aside>

      <main class="shell__content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-template>
