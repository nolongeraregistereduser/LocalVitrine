<div class="dashboard">
  <h1 class="lv-page-title">Tableau de bord</h1>
  <p class="lv-subtitle">Pilotez vos pages locales et verifiez l'etat de l'API.</p>

  <div class="dashboard__grid">
    <app-ui-card>
      <h2 class="card-title">Etat de l'API</h2>
      <p *ngIf="loading" class="muted">Chargement du statut...</p>
      <p *ngIf="error" class="error">{{ error }}</p>
      <div *ngIf="health && !loading" class="api-status">
        <app-status-badge tone="success">{{ health.status }}</app-status-badge>
        <p class="muted">Horodatage: {{ health.timestamp }}</p>
      </div>
    </app-ui-card>

    <app-ui-card>
      <h2 class="card-title">Prochaine etape</h2>
      <p class="muted">Commencez par creer votre premiere page projet et publiez-la en un clic.</p>
      <app-status-badge tone="neutral">Configuration initiale</app-status-badge>
    </app-ui-card>
  </div>
</div>
